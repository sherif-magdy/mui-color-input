packages:
  # include packages in subfolders (change as required)
  - 'docs'
allowBuilds:
  core-js: false # postinstall only prints a sponsor message
  core-js-pure: false # postinstall only prints a sponsor message
  esbuild: true # Vite/Vitest/Storybook rely on it; fetches the native binary
minimumReleaseAgeExclude:
  - '@sherifmagdy/mui-color-input@10.0.0'
